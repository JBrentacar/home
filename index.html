<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBレンタカー石巻店 - ご利用者専用</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            background: #f0f4f8;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        /* ヘッダー */
        header {
            background: linear-gradient(135deg, #0068e9, #0051b5);
            padding: 20px 16px 24px;
            text-align: center;
            color: white;
        }

        header img {
            max-width: 110px;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: .05em;
        }

        header p {
            font-size: 13px;
            opacity: .85;
            margin-top: 4px;
        }

        /* メインコンテンツ */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 14px 60px;
        }

        /* 延長・返却メインボタン */
        .primary-action {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,.1);
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .primary-action .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .primary-action a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #0068e9, #0051b5);
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            padding: 18px 24px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,104,233,.35);
            transition: transform .2s, box-shadow .2s;
        }

        .primary-action a:active {
            transform: scale(.98);
            box-shadow: 0 3px 8px rgba(0,104,233,.3);
        }

        .primary-action a i {
            font-size: 22px;
        }

        /* セクション */
        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            letter-spacing: .1em;
            text-transform: uppercase;
            margin: 0 4px 10px;
        }

        /* サービスグリッド */
        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .service-card {
            background: white;
            border-radius: 14px;
            padding: 18px 14px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            transition: transform .2s, box-shadow .2s;
            min-height: 100px;
        }

        .service-card:active {
            transform: scale(.97);
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }

        .service-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .service-card .name {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.3;
        }

        .service-card .desc {
            font-size: 11px;
            color: #999;
            line-height: 1.4;
        }

        .icon-snow   { background: linear-gradient(135deg, #48cae4, #0096c7); }
        .icon-person { background: linear-gradient(135deg, #52b788, #2d6a4f); }
        .icon-calc   { background: linear-gradient(135deg, #ffc600, #f4a100); }
        .icon-speed  { background: linear-gradient(135deg, #c77dff, #7b2fff); }
        .icon-faq    { background: linear-gradient(135deg, #ff9f43, #ee5a24); }

        /* お問い合わせ */
        .contact-section {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            padding: 20px;
            margin-bottom: 20px;
        }

        .contact-section .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-section .section-title i {
            color: #0068e9;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .contact-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 8px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            color: white;
            transition: transform .2s;
        }

        .contact-btn:active { transform: scale(.96); }
        .contact-btn i { font-size: 22px; }

        .btn-tel  { background: linear-gradient(135deg, #28a745, #1e7e34); }
        .btn-mail { background: linear-gradient(135deg, #17a2b8, #117a8b); }
        .btn-line { background: linear-gradient(135deg, #00c300, #009400); }

        /* 店舗情報 */
        .store-section {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
            padding: 20px;
            margin-bottom: 20px;
        }

        .store-section .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .store-section .section-title i { color: #0068e9; }

        .store-info-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        .store-info-row i {
            color: #0068e9;
            margin-top: 3px;
            flex-shrink: 0;
            width: 16px;
        }

        .closed-day { color: #e74c3c; font-weight: 700; }

        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #00509e;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 14px;
            transition: transform .2s;
        }

        .map-btn:active { transform: scale(.98); }

        /* フッター */
        footer {
            background: linear-gradient(135deg, #0068e9, #0051b5);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            opacity: .95;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="JBレンタカー石巻店">
    <h1>JBレンタカー石巻店</h1>
    <p>ご利用者様専用ページ</p>
</header>

<main>

    <!-- 延長・返却（最重要） -->
    <div class="primary-action">
        <div class="label">最もよく使われる手続き</div>
        <a href="https://jbrentacar.github.io/home/extend-return.html" target="_blank">
            <i class="fas fa-car-side"></i>
            延長・返却のお手続き
        </a>
    </div>

    <!-- サービス一覧 -->
    <div class="section-label">サービス</div>
    <div class="service-grid">

        <a href="https://jbrentacar.github.io/Tire/" target="_blank" class="service-card">
            <div class="service-icon icon-snow">
                <i class="fas fa-snowflake"></i>
            </div>
            <div>
                <div class="name">スタッドレス<br>タイヤ</div>
            </div>
        </a>

        <a href="https://forms.wix.com/r/7101834515030474980" target="_blank" class="service-card">
            <div class="service-icon icon-person">
                <i class="fas fa-id-card"></i>
            </div>
            <div>
                <div class="name">運転者追加</div>
            </div>
        </a>

        <a href="https://jbrentacar.github.io/FeeCalculation/" target="_blank" class="service-card">
            <div class="service-icon icon-calc">
                <i class="fas fa-calculator"></i>
            </div>
            <div>
                <div class="name">料金シミュ<br>レーション</div>
            </div>
        </a>

        <a href="https://jbrentacar.github.io/home/mileage-checker.html" target="_blank" class="service-card">
            <div class="service-icon icon-speed">
                <i class="fas fa-tachometer-alt"></i>
            </div>
            <div>
                <div class="name">走行距離<br>チェッカー</div>
            </div>
        </a>

        <a href="https://jbrentacar.github.io/faq/" target="_blank" class="service-card" style="grid-column: span 2;">
            <div style="display:flex; align-items:center; gap:14px; width:100%;">
                <div class="service-icon icon-faq">
                    <i class="fas fa-question-circle"></i>
                </div>
                <div>
                    <div class="name">よくあるご質問</div>
                    <div class="desc">料金・車両・ご利用条件など</div>
                </div>
                <i class="fas fa-chevron-right" style="margin-left:auto; color:#ccc;"></i>
            </div>
        </a>

    </div>

    <!-- お問い合わせ -->
    <div class="contact-section">
        <div class="section-title">
            <i class="fas fa-headset"></i> お問い合わせ
        </div>
        <div class="contact-grid">
            <a href="tel:0120-204-625" class="contact-btn btn-tel">
                <i class="fas fa-phone"></i>電話
            </a>
            <a href="mailto:ishimaki@jb-rentacar.com" class="contact-btn btn-mail">
                <i class="fas fa-envelope"></i>メール
            </a>
            <a href="https://line.me/R/ti/p/@991rklki" target="_blank" class="contact-btn btn-line">
                <i class="fab fa-line"></i>LINE
            </a>
        </div>
    </div>

    <!-- 店舗情報 -->
    <div class="store-section">
        <div class="section-title">
            <i class="fas fa-store"></i> 店舗情報
        </div>
        <div class="store-info-row">
            <i class="fas fa-map-marker-alt"></i>
            <span>〒986-0814<br>宮城県石巻市南中里2丁目9‐27<br>タイムヒルズ2階</span>
        </div>
        <div class="store-info-row">
            <i class="fas fa-clock"></i>
            <span>
                平日：9:00〜18:00<br>
                土日：10:00〜16:00<br>
                <span class="closed-day">定休日：水曜・祝日</span>
            </span>
        </div>
        <a href="https://maps.app.goo.gl/oDU1H2aVd5GWzxy79" target="_blank" class="map-btn">
            <i class="fas fa-map-marked-alt"></i> Google マップで確認
        </a>
    </div>

</main>

<footer>
    &copy; 2025 JBレンタカー石巻店<br>
    安全運転でお出かけください
</footer>

</body>
</html>
